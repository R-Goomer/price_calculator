<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Price Calculator</title>
</head>
<body>

<div style="max-width:400px;margin:0 auto;padding:1.5rem 1rem;display:flex;flex-direction:column;gap:1.2rem;">
  <h2>Price calculator</h2>

  <!-- LENGTH -->
  <div>
    <label>Length</label><br>
    Inch: <input type="number" style="width:70px;" id="length_in" oninput="sync('length','in')">
    mm: <input type="number" style="width:70px;" id="length_mm" oninput="sync('length','mm')">
  </div>

  <!-- WIDTH -->
  <div>
    <label>Width</label><br>
    Inch: <input type="number" style="width:70px;" id="width_in" oninput="sync('width','in')">
    mm: <input type="number" style="width:70px;" id="width_mm" oninput="sync('width','mm')">
  </div>

  <!-- HEIGHT -->
  <div>
    <label>Height</label><br>
    Inch: <input type="number" style="width:70px;" id="height_in" oninput="sync('height','in')">
    mm: <input type="number" style="width:70px;" id="height_mm" oninput="sync('height','mm')">
  </div>

  <!-- EFFORT -->
  <div>
    <label>Effort</label>
    <select id="effort" onchange="calc()">
      <option value="0.15">Minimum</option>
      <option value="0.18">Medium</option>
      <option value="0.20" selected>Normal</option>
      <option value="0.24">Sample</option>
    </select>
  </div>

  <!-- CUSTOM MULTIPLIER -->
  <div>
    <label>Custom multiplier</label>
    <input type="number" style="width:90px;" id="custom-mult" step="0.01" oninput="calc()">
    <span id="mult-indicator" style="display:none;"></span>
  </div>

  <!-- UNIT PRICE -->
  <div>
    <span>Price per item</span><br>
    <span id="unit-price">—</span>
  </div>

  <!-- QTY -->
  <div>
    <label>Quantity</label>
    <input type="number" style="width:70px;" id="qty" oninput="calc()">
  </div>

  <!-- TOTAL -->
  <div id="total-block" style="display:none;">
    <span>Total price</span><br>
    <span id="total-price">—</span>
  </div>
</div>

<script>
function mmToIn(mm) {
  return mm / 25.4;
}

function inToMm(inch) {
  return inch * 25.4;
}

// Sync function
function sync(field, type) {
  var inEl = document.getElementById(field + '_in');
  var mmEl = document.getElementById(field + '_mm');

  if (type === 'in') {
    var val = parseFloat(inEl.value);
    if (!isNaN(val)) {
      mmEl.value = (val * 25.4).toFixed(2);
    }
  } else {
    var val = parseFloat(mmEl.value);
    if (!isNaN(val)) {
      inEl.value = (val / 25.4).toFixed(3);
    }
  }

  calc();
}

function calc() {
  var l = parseFloat(document.getElementById('length_in').value) || 0;
  var w = parseFloat(document.getElementById('width_in').value) || 0;
  var h = parseFloat(document.getElementById('height_in').value) || 0;
  var q = parseFloat(document.getElementById('qty').value);

  var customVal = document.getElementById('custom-mult').value.trim();
  var indicator = document.getElementById('mult-indicator');

  var m;
  if (customVal !== '' && !isNaN(parseFloat(customVal))) {
    m = parseFloat(customVal);
    indicator.textContent = 'Using custom multiplier ×' + m;
    indicator.style.display = 'block';
  } else {
    m = parseFloat(document.getElementById('effort').value);
    indicator.style.display = 'none';
  }

  var vol = l * w * h;

  var unitEl = document.getElementById('unit-price');
  var totalBlock = document.getElementById('total-block');
  var totalEl = document.getElementById('total-price');

  if (vol > 0) {
    var unit = vol * m;
    unitEl.textContent = unit.toFixed(2);

    if (q > 0) {
      totalBlock.style.display = 'block';
      totalEl.textContent = (unit * q).toFixed(2);
    } else {
      totalBlock.style.display = 'none';
    }
  } else {
    unitEl.textContent = '—';
    totalBlock.style.display = 'none';
  }
}
</script>

</body>
</html>
