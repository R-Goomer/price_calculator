<div style="max-width:400px;margin:0 auto;padding:1.5rem 1rem;display:flex;flex-direction:column;gap:1.2rem;">
  <h2 style="font-size:18px;font-weight:500;margin:0;color:var(--color-text-primary);">Price calculator</h2>

  <div style="display:flex;flex-direction:column;gap:0.6rem;">
    <label style="font-size:13px;color:var(--color-text-secondary);">Length</label>
    <input type="number" id="length" min="0" placeholder="0" oninput="calc()" style="width:100%;box-sizing:border-box;">
  </div>

  <div style="display:flex;flex-direction:column;gap:0.6rem;">
    <label style="font-size:13px;color:var(--color-text-secondary);">Width</label>
    <input type="number" id="width" min="0" placeholder="0" oninput="calc()" style="width:100%;box-sizing:border-box;">
  </div>

  <div style="display:flex;flex-direction:column;gap:0.6rem;">
    <label style="font-size:13px;color:var(--color-text-secondary);">Height</label>
    <input type="number" id="height" min="0" placeholder="0" oninput="calc()" style="width:100%;box-sizing:border-box;">
  </div>

  <div style="display:flex;flex-direction:column;gap:0.6rem;">
    <label style="font-size:13px;color:var(--color-text-secondary);">Effort</label>
    <select id="effort" onchange="calc()" style="width:100%;box-sizing:border-box;">
      <option value="0.15">Low</option>
      <option value="0.18" selected>Medium</option>
      <option value="0.20">Hard</option>
    </select>
  </div>

  <div style="display:flex;flex-direction:column;gap:0.6rem;">
    <label style="font-size:13px;color:var(--color-text-secondary);">Custom multiplier <span style="color:var(--color-text-tertiary);">(overrides effort above)</span></label>
    <input type="number" id="custom-mult" min="0" step="0.01" placeholder="e.g. 0.22" oninput="calc()" style="width:100%;box-sizing:border-box;">
    <span id="mult-indicator" style="font-size:12px;color:var(--color-text-tertiary);display:none;"></span>
  </div>

  <div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:1rem;display:flex;flex-direction:column;gap:0.4rem;">
    <span style="font-size:13px;color:var(--color-text-secondary);">Price per item</span>
    <span id="unit-price" style="font-size:28px;font-weight:500;color:var(--color-text-primary);">—</span>
  </div>

  <div style="display:flex;flex-direction:column;gap:0.6rem;">
    <label style="font-size:13px;color:var(--color-text-secondary);">Number of items (optional)</label>
    <input type="number" id="qty" min="1" placeholder="e.g. 10" oninput="calc()" style="width:100%;box-sizing:border-box;">
  </div>

  <div id="total-block" style="display:none;border-top:0.5px solid var(--color-border-tertiary);padding-top:1rem;flex-direction:column;gap:0.4rem;">
    <span style="font-size:13px;color:var(--color-text-secondary);">Total price</span>
    <span id="total-price" style="font-size:28px;font-weight:500;color:var(--color-text-primary);">—</span>
  </div>
</div>

<script>
function calc() {
  var l = parseFloat(document.getElementById('length').value) || 0;
  var w = parseFloat(document.getElementById('width').value) || 0;
  var h = parseFloat(document.getElementById('height').value) || 0;
  var q = parseFloat(document.getElementById('qty').value);
  var customVal = document.getElementById('custom-mult').value.trim();
  var indicator = document.getElementById('mult-indicator');

  var m;
  if (customVal !== '' && !isNaN(parseFloat(customVal))) {
    m = parseFloat(customVal);
    indicator.textContent = 'Using custom multiplier ×' + m;
    indicator.style.display = 'block';
  } else {
    m = parseFloat(document.getElementById('effort').value);
    indicator.style.display = 'none';
  }

  var vol = l * w * h;
  var unitEl = document.getElementById('unit-price');
  var totalBlock = document.getElementById('total-block');
  var totalEl = document.getElementById('total-price');

  if (vol > 0) {
    var unit = vol * m;
    unitEl.textContent = unit.toFixed(2);
    if (q > 0) {
      totalBlock.style.display = 'flex';
      totalEl.textContent = (unit * q).toFixed(2);
    } else {
      totalBlock.style.display = 'none';
    }
  } else {
    unitEl.textContent = '—';
    totalBlock.style.display = 'none';
  }
}
</script>
